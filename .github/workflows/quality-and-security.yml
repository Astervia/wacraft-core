name: Quality & Security (Go)

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

permissions:
    contents: read

concurrency:
    group: quality-security-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-test:
        name: Code Quality – Format, Vet & Tests
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Check gofmt (no files should change)
              run: |
                  files="$(gofmt -l .)"
                  if [ -n "$files" ]; then
                    echo "The following files are not gofmt'ed:"
                    echo "$files"
                    exit 1
                  fi

            - name: Run go vet
              run: go vet ./...

            - name: Run tests (memory mode)
              run: go test ./... -v -race

            - name: Run tests (distributed mode — with Redis)
              run: go test ./... -v -race
              env:
                  REDIS_URL: redis://localhost:6379

    security:
        name: Dependency Security Scan (govulncheck)
        runs-on: ubuntu-latest
        needs: lint-and-test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: |
                  "$(go env GOPATH)/bin/govulncheck" ./...

    build:
        name: Build Validation
        runs-on: ubuntu-latest
        needs: [lint-and-test, security]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.1"
                  cache: true

            - name: Build all packages
              run: go build ./...
